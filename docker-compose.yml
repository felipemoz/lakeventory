services:
  lakeventory:
    build: .
    container_name: lakeventory
    # Credentials e configuração de workspaces vêm do config.yaml montado abaixo.
    # Não use env_file nem variáveis DATABRICKS_* aqui — configure via .lakeventory/config.yaml
    environment:
      # Scheduling
      RUN_INTERVAL_MINUTES: ${RUN_INTERVAL_MINUTES:-1440}  # once per day
      INCREMENTAL_AFTER_FIRST: ${INCREMENTAL_AFTER_FIRST:-1}
      FORCE_FULL: ${FORCE_FULL:-0}

      # Output
      OUTPUT_DIR: ${OUTPUT_DIR:-/data}
      CACHE_DIR: ${CACHE_DIR:-/cache}
      OUT: ${OUT:-report.md}
      OUT_XLSX: ${OUT_XLSX:-report.xlsx}

      # Optional behavior
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BATCH_SIZE: ${BATCH_SIZE:-200}
      BATCH_SLEEP_MS: ${BATCH_SLEEP_MS:-0}
      SERVERLESS: ${SERVERLESS:-0}
      INCLUDE_RUNS: ${INCLUDE_RUNS:-0}
      INCLUDE_QUERY_HISTORY: ${INCLUDE_QUERY_HISTORY:-0}
      INCLUDE_DBFS: ${INCLUDE_DBFS:-0}
      COLLECTORS: ${COLLECTORS:-}

    volumes:
      - ./.lakeventory:/app/.lakeventory:ro   # monta config.yaml com credenciais
      - lakeventory_output:/data
      - lakeventory_cache:/cache

volumes:
  lakeventory_output:
  lakeventory_cache:
