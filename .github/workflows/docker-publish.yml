name: docker-publish

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/lakeventory

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Run tests
        run: python -m pytest -q

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: alpine
            dockerfile: Dockerfile
            tags: "latest,alpine"
            scan_tag: alpine
          - name: distroless
            dockerfile: Dockerfile.distroless
            tags: "distroless"
            scan_tag: distroless
          - name: static
            dockerfile: Dockerfile.static
            tags: "static"
            scan_tag: static

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        shell: bash
        run: |
          IFS="," read -ra TAGS <<< "${{ matrix.tags }}"
          TAG_ARGS=""
          for TAG in "${TAGS[@]}"; do
            TAG_ARGS+=" --tag ${IMAGE_NAME}:${TAG}"
            TAG_ARGS+=" --tag ${IMAGE_NAME}:${TAG}-${GITHUB_SHA}"
          done

          SCAN_REF="${IMAGE_NAME}:${{ matrix.scan_tag }}-${GITHUB_SHA}"

          docker buildx build \
            --file "${{ matrix.dockerfile }}" \
            ${TAG_ARGS} \
            --push \
            .

          echo "scan_ref=${SCAN_REF}" >> "$GITHUB_OUTPUT"

      - name: Vulnerability scan (report)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.build.outputs.scan_ref }}
          format: table
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Vulnerability gate (CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.build.outputs.scan_ref }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL
